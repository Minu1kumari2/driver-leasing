# App name
spring.application.name=driver-leasing

# Server
server.port=${PORT:8080}

# Database — works locally AND on Railway
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/driver_leasing}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Techno@0035}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Security
spring.security.user.name=user
spring.security.user.password=12345